version: "3"

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  windows: ./build/windows/Taskfile.yml

vars:
  APP_NAME:
    sh: . ./project.env && printf "%s" "$APP_BINARY_NAME"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 43817}}"
  APP_VERSION:
    sh: |
      version='{{.VERSION | default ""}}'
      if [ -n "$version" ]; then
        printf "%s" "${version#v}"
      elif [ -f project.env ]; then
        . ./project.env
        printf "%s" "${APP_VERSION#v}"
      else
        printf "0.0.1"
      fi
  RELEASE_REPO:
    sh: . ./project.env && printf "%s" "$APP_REPOSITORY"
  RELEASE_BASE_NAME:
    sh: . ./project.env && printf "%s" "$APP_BINARY_NAME"
  MACOS_MIN_VERSION:
    sh: . ./project.env && printf "%s" "$MACOS_MIN_VERSION"
  RELEASE_DIR: '{{.BIN_DIR}}/release/{{.APP_VERSION}}'
  BUILD_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo dev
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  build:darwin:
    summary: Builds a macOS binary
    cmds:
      - task: darwin:build
        vars:
          ARCH: "{{.ARCH | default ARCH}}"

  package:darwin:
    summary: Packages a macOS .app bundle
    cmds:
      - task: darwin:package
        vars:
          ARCH: "{{.ARCH | default ARCH}}"

  package:darwin:universal:
    summary: Packages a universal macOS .app bundle
    cmds:
      - task: darwin:package:universal

  build:windows:
    summary: Builds a Windows executable
    cmds:
      - task: windows:build
        vars:
          ARCH: "{{.ARCH | default \"amd64\"}}"
          CGO_ENABLED: "{{.CGO_ENABLED | default \"1\"}}"

  package:windows:
    summary: Packages a Windows installer
    cmds:
      - task: windows:package
        vars:
          ARCH: "{{.ARCH | default \"amd64\"}}"
          CGO_ENABLED: "{{.CGO_ENABLED | default \"1\"}}"

  setup:docker:
    summary: Builds Docker image for cross-compilation
    cmds:
      - task: common:setup:docker

  release:archive:darwin:
    summary: Creates a macOS tar.gz update archive from the current .app bundle
    cmds:
      - mkdir -p "{{.RELEASE_DIR}}"
      - tar -C "{{.BIN_DIR}}" -czf "{{.RELEASE_DIR}}/{{.RELEASE_BASE_NAME}}-{{.APP_VERSION}}-macos-{{.ARCH | default ARCH}}.tar.gz" "{{.APP_NAME}}.app"

  release:archive:windows:
    summary: Creates a Windows zip update archive from the current executable
    cmds:
      - mkdir -p "{{.RELEASE_DIR}}"
      - powershell Compress-Archive -Path "{{.BIN_DIR}}/{{.APP_NAME}}.exe" -DestinationPath "{{.RELEASE_DIR}}/{{.RELEASE_BASE_NAME}}-{{.APP_VERSION}}-windows-{{.ARCH | default \"amd64\"}}.zip" -Force

  release:manifest:
    summary: Generates update.json for automatic updates
    cmds:
      - go run ./scripts/release manifest -version "{{.APP_VERSION}}" -assets-dir "{{.RELEASE_DIR}}" -out "{{.RELEASE_DIR}}/update.json" -repo "{{.RELEASE_REPO}}" -base-name "{{.RELEASE_BASE_NAME}}"
