version: "3"

info:
  companyName: "MiniDB Contributors"
  productName: "MiniDB"
  productIdentifier: "com.minidb.app"
  description: "AI enhanced database management tool"
  copyright: "(c) 2026, MiniDB Contributors"
  comments: "AI enhanced database management tool"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - dist
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
      - "*.tsx"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task build DEV=true
      type: blocking
    - cmd: wails3 task run
      type: primary

fileAssociations: []
